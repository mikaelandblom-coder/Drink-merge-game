<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mixology Merge</title>
<!-- PNG icons: iOS Safari ignores SVG/data-URI favicons, so a real apple-touch-icon is required -->
<link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32.png?v=62">
<link rel="icon" type="image/png" sizes="192x192" href="assets/images/icon-192.png?v=62">
<link rel="apple-touch-icon" href="assets/images/apple-touch-icon.png?v=62">
<meta name="apple-mobile-web-app-title" content="Mixology Merge">
<link rel="stylesheet" href="style.css?v=62">
</head>
<body>

<!-- Welcome / home screen -->
<div id="welcome">
  <div id="welcome-art"></div>
  <div id="welcome-ui">
    <div id="welcome-title">MIXOLOGY MERGE</div>
    <div id="welcome-sub">a world tour of flavours</div>
    <div id="welcome-version"></div>
    <!-- Cool mode (30fps cap) â€” shelved for now in favour of the DOM-layer
         background; the game.js plumbing (coolMode) is still in place.
         Restore this block + the wiring in welcome.js to bring it back.
    <label id="cool-toggle" class="map-opt-toggle"
           title="Halves the frame rate so the phone stays cooler on long sessions">
      <input type="checkbox" id="cool-cb">
      <span>Cool mode (30 fps, less heat)</span>
    </label>
    -->
    <div id="map-cards"></div>
  </div>
</div>

<!-- Game screen (hidden until a map is selected) -->
<div id="wrap">
  <div id="stage">
    <!-- Map background lives in the DOM, NOT on the canvas: the compositor
         rasters it once and caches it, so the render loop no longer blits a
         full-frame background image every frame (heat). -->
    <div id="stage-bg"></div>
    <canvas id="c"></canvas>
    <audio id="bgm" loop preload="auto" src="assets/audio/bgm.mp3"></audio>
    <div id="over">
      <button id="over-close" aria-label="Hide results and view the table">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
      </button>
      <h2>Game over!</h2>
      <div id="finalScore"></div>
      <div class="over-btns">
        <button id="again">Play again</button>
        <button id="menu">Menu</button>
      </div>
    </div>
    <button id="over-peek">Show results</button>
    <div id="hud-btns">
      <button id="mute" class="hud-btn" aria-label="Toggle sound effects" aria-pressed="true">
        <svg class="icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
        <svg class="icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="22" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="22" y2="15"/></svg>
      </button>
      <button id="musicBtn" class="hud-btn" aria-label="Toggle music" aria-pressed="true">
        <svg class="icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        <svg class="icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
      </button>
      <button id="menuBtn" class="hud-btn" aria-label="Return to menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/><path d="M10 21v-6h4v6"/></svg>
      </button>
    </div>
    <div id="confirm-menu">
      <p class="confirm-title">Return to menu?</p>
      <p class="confirm-sub">Your current run will be lost.</p>
      <div class="confirm-btns">
        <button id="confirm-yes">Yes, quit</button>
        <button id="confirm-no">Keep playing</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script src="config/constants.js?v=62"></script>
<script src="config/hitboxes.js?v=62"></script>
<script src="config/items.js?v=62"></script>
<script src="config/maps.js?v=62"></script>
<script src="scores.js?v=62"></script>
<script src="audio.js?v=62"></script>
<script src="render.js?v=62"></script>
<script src="ui.js?v=62"></script>
<script src="welcome.js?v=62"></script>
<script src="game.js?v=62"></script>
<!-- Dev-only test harness: inert unless the URL has ?test (see test.js) -->
<script src="test.js?v=62"></script>
</body>
</html>
