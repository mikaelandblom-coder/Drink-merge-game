<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mixology Merge</title>
<!-- PNG icons: iOS Safari ignores SVG/data-URI favicons, so a real apple-touch-icon is required -->
<link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32.png?v=43">
<link rel="icon" type="image/png" sizes="192x192" href="assets/images/icon-192.png?v=43">
<link rel="apple-touch-icon" href="assets/images/apple-touch-icon.png?v=43">
<meta name="apple-mobile-web-app-title" content="Mixology Merge">
<link rel="stylesheet" href="style.css?v=43">
</head>
<body>

<!-- Welcome / home screen -->
<div id="welcome">
  <div id="welcome-art"></div>
  <div id="welcome-ui">
    <div id="welcome-title">MIXOLOGY MERGE</div>
    <div id="welcome-sub">a world tour of flavours</div>
    <div id="welcome-version"></div>
    <div id="map-cards"></div>
  </div>
</div>

<!-- Game screen (hidden until a map is selected) -->
<div id="wrap">
  <div id="stage">
    <canvas id="c"></canvas>
    <audio id="bgm" loop preload="auto" src="assets/audio/bgm.mp3"></audio>
    <div id="over">
      <h2>Game over!</h2>
      <div id="finalScore"></div>
      <div class="over-btns">
        <button id="again">Play again</button>
        <button id="menu">Menu</button>
      </div>
    </div>
    <div id="hud-btns">
      <button id="mute" aria-label="Toggle sound">sound on</button>
      <button id="musicBtn" aria-label="Toggle music">music on</button>
      <button id="menuBtn" aria-label="Return to menu">menu</button>
    </div>
    <div id="confirm-menu">
      <p class="confirm-title">Return to menu?</p>
      <p class="confirm-sub">Your current run will be lost.</p>
      <div class="confirm-btns">
        <button id="confirm-yes">Yes, quit</button>
        <button id="confirm-no">Keep playing</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script src="config/constants.js?v=43"></script>
<script src="config/hitboxes.js?v=43"></script>
<script src="config/items.js?v=43"></script>
<script src="config/maps.js?v=43"></script>
<script src="scores.js?v=43"></script>
<script src="audio.js?v=43"></script>
<script src="render.js?v=43"></script>
<script src="ui.js?v=43"></script>
<script src="welcome.js?v=43"></script>
<script src="game.js?v=43"></script>
</body>
</html>
