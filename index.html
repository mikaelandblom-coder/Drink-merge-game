<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mixology Merge</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍹</text></svg>">
<link rel="stylesheet" href="style.css?v=23">
</head>
<body>

<!-- Welcome / home screen -->
<div id="welcome">
  <div id="welcome-art"></div>
  <div id="welcome-ui">
    <div id="welcome-title">MIXOLOGY MERGE</div>
    <div id="welcome-sub">a world tour of flavours</div>
    <div id="map-cards"></div>
  </div>
</div>

<!-- Game screen (hidden until a map is selected) -->
<div id="wrap">
  <div id="stage">
    <canvas id="c"></canvas>
    <audio id="bgm" loop preload="auto" src="assets/audio/bgm.mp3"></audio>
    <div id="over">
      <h2>Game over!</h2>
      <div id="finalScore"></div>
      <div class="over-btns">
        <button id="again">Play again</button>
        <button id="menu">Menu</button>
      </div>
    </div>
    <div id="hud-btns">
      <button id="mute" aria-label="Toggle sound">sound on</button>
      <button id="musicBtn" aria-label="Toggle music">music on</button>
      <button id="menuBtn" aria-label="Return to menu">menu</button>
    </div>
    <div id="confirm-menu">
      <p class="confirm-title">Return to menu?</p>
      <p class="confirm-sub">Your current run will be lost.</p>
      <div class="confirm-btns">
        <button id="confirm-yes">Yes, quit</button>
        <button id="confirm-no">Keep playing</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script src="config/constants.js?v=23"></script>
<script src="config/items.js?v=23"></script>
<script src="config/maps.js?v=23"></script>
<script src="scores.js?v=23"></script>
<script src="audio.js?v=23"></script>
<script src="render.js?v=23"></script>
<script src="ui.js?v=23"></script>
<script src="welcome.js?v=23"></script>
<script src="game.js?v=23"></script>
</body>
</html>
